name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm run mediapipe:install

      - name: Generate env config
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SITE_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_SITE_URL: https://${{ github.event.repository.name }}.github.io
          MEDIAPIPE_APP_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mediapipe-samples-web/
        run: node scripts/generate-env-config.mjs

      - name: Build site for GitHub Pages
        env:
          SITE_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_SITE_URL: https://${{ github.event.repository.name }}.github.io
          MEDIAPIPE_APP_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mediapipe-samples-web/
        run: node scripts/build-site.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
